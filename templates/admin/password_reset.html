{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<div class="km-reset-wrap">
    <div class="km-reset-card">
        <h1 class="km-reset-title">Parolamı Unuttum</h1>
        <p class="km-reset-text">
            Hesabınıza kayıtlı e-posta adresini girin. Parola sıfırlama bağlantısını
            e-posta ile göndereceğiz.
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="km-reset-field">
                <label for="id_email">E-posta Adresi</label>
                <input type="email" name="email" id="id_email" required autofocus class="km-reset-input">
            </div>
            <button type="submit" class="km-reset-btn">Sıfırlama Bağlantısı Gönder</button>
        </form>
        <a href="{% url 'admin:login' %}" class="km-reset-back">&larr; Girişe dön</a>
    </div>
</div>

<style>
.km-reset-wrap { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 40px; }
.km-reset-card {
    background: rgba(15,39,69,0.5); border: 1px solid rgba(93,169,240,0.2);
    border-radius: 16px; padding: 40px; max-width: 440px; width: 100%;
    backdrop-filter: blur(10px);
}
.km-reset-title { color: #fff; font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; }
.km-reset-text { color: #c5d6e8; line-height: 1.7; margin-bottom: 26px; font-size: 0.95rem; }
.km-reset-field { margin-bottom: 20px; }
.km-reset-field label { display: block; color: #cfe2f5; font-weight: 500; margin-bottom: 8px; font-size: 0.9rem; }
.km-reset-input {
    width: 100%; padding: 13px 16px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(93,169,240,0.3);
    color: #fff; font-size: 1rem;
}
.km-reset-input:focus { outline: none; border-color: #2E8BE6; box-shadow: 0 0 0 3px rgba(46,139,230,0.15); }
.km-reset-btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer;
    background: linear-gradient(135deg, #5DA9F0, #2E8BE6); color: #fff; font-size: 1rem; font-weight: 600;
    transition: transform 0.2s ease;
}
.km-reset-btn:hover { transform: translateY(-2px); }
.km-reset-back { display: inline-block; margin-top: 20px; color: #8FC0F0; font-size: 0.9rem; }
</style>
{% endblock %}
