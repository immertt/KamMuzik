{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<div class="km-reset-wrap">
    <div class="km-reset-card">
        <h1 class="km-reset-title">Parola Değiştirildi</h1>
        <p class="km-reset-text">
            Parolanız başarıyla güncellendi. Artık yeni parolanızla giriş yapabilirsiniz.
        </p>
        <a href="{% url 'admin:login' %}" class="km-reset-btn" style="display:block;text-align:center;text-decoration:none;">Giriş Yap</a>
    </div>
</div>

<style>
.km-reset-wrap { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 40px; }
.km-reset-card {
    background: rgba(15,39,69,0.5); border: 1px solid rgba(93,169,240,0.2);
    border-radius: 16px; padding: 40px; max-width: 440px; width: 100%; backdrop-filter: blur(10px);
}
.km-reset-title { color: #fff; font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; }
.km-reset-text { color: #c5d6e8; line-height: 1.7; margin-bottom: 26px; font-size: 0.95rem; }
.km-reset-btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #5DA9F0, #2E8BE6); color: #fff; font-size: 1rem; font-weight: 600;
}
</style>
{% endblock %}
